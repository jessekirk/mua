name: Build

permissions:
  contents: write

on:
  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  version:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $VersionConfig = Get-Content version.json | ConvertFrom-Json

          $Major = $VersionConfig.Major
          $Minor = $VersionConfig.Minor

          $Build = $env:GITHUB_RUN_NUMBER
          $Revision = (git rev-list --count HEAD)

          $Version = "$Major.$Minor.$Build.$Revision"

          Write-Host "Generated Version: $Version"

          "version=$Version" >> $env:GITHUB_OUTPUT

      - name: Show Version
        shell: pwsh
        run: |
          Write-Host "Version = ${{ steps.version.outputs.version }}"

      - name: Create Tag
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          $Version = "${{ steps.version.outputs.version }}"

          if (git tag --list "v$Version") {
            Write-Host "Tag already exists."
          }
          else {
            git tag "v$Version"
            git push origin "v$Version"
          }

      - name: Debug Files
        shell: pwsh
        run: |
          Get-Location
          Get-ChildItem -Recurse

      - name: Package Module
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $Source = ".\src\mua"
          $Dest = ".\output\mua"

          New-Item `
            -ItemType Directory `
            -Path $Dest `
            -Force | Out-Null

          Copy-Item `
            -Path "$Source\*" `
            -Destination $Dest `
            -Recurse `
            -Force

          Write-Host "Copied files:"
          Get-ChildItem $Dest -Recurse

          $Manifest = Join-Path $Dest "mua.psd1"

          if (!(Test-Path $Manifest)) {
            throw "Manifest missing: $Manifest"
          }

          Update-ModuleManifest `
            -Path $Manifest `
            -ModuleVersion $env:VERSION

      - name: Verify Manifest
        shell: pwsh
        run: |
          Test-ModuleManifest .\output\mua\mua.psd1

      - name: Prepare Versioned Package
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $PackageRoot = ".\package"
          $ModuleRoot = "$PackageRoot\mua\$env:VERSION"
          $ZipFile = ".\output\mua-$env:VERSION.zip"

          Remove-Item $PackageRoot `
            -Recurse `
            -Force `
            -ErrorAction Ignore

          Remove-Item $ZipFile `
            -Force `
            -ErrorAction Ignore

          New-Item `
            -ItemType Directory `
            -Path $ModuleRoot `
            -Force | Out-Null

          Copy-Item `
            -Path .\output\mua\* `
            -Destination $ModuleRoot `
            -Recurse `
            -Force

          Push-Location $PackageRoot

          Compress-Archive `
            -Path ".\mua" `
            -DestinationPath "..\output\mua-$env:VERSION.zip" `
            -Force

          Pop-Location

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            output/mua-${{ steps.version.outputs.version }}.zip

      - name: Upload Module
        uses: actions/upload-artifact@v4
        with:
          name: mua-${{ steps.version.outputs.version }}
          path: ./package/mua/${{ steps.version.outputs.version }}
